# /etc/nginx/sites-available/sv-traders.in

# Redirect www → non-www
server {
    listen 80;
    listen [::]:80;
    server_name www.sv-traders.in;
    return 301 https://sv-traders.in$request_uri;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sv-traders.in;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sv-traders.in www.sv-traders.in;

    # SSL — Certbot will fill these in automatically
    ssl_certificate     /etc/letsencrypt/live/sv-traders.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sv-traders.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Serve React frontend (production build)
    root /home/ubuntu/svtraders/client/build;
    index index.html;

    # API requests → Express backend on port 5000
    location /api/ {
        proxy_pass         http://localhost:5000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # React app — serve index.html for all routes (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN" always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy       "no-referrer-when-downgrade" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
}
