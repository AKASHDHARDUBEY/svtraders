# ──────────────────────────────────────────────────────────────────
# Nginx Configuration for sv-traders.in
# Copy this file to /etc/nginx/sites-available/sv-traders.in
# ──────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name sv-traders.in www.sv-traders.in;

    # Redirect HTTP → HTTPS (enabled after certbot runs)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sv-traders.in www.sv-traders.in;

    # SSL certs (managed by Certbot — will be auto-filled)
    ssl_certificate     /etc/letsencrypt/live/sv-traders.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sv-traders.in/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── React Frontend (static build) ───────────────────────────
    root /var/www/sv-traders.in;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Express API (reverse proxy) ─────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Security Headers ────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Gzip ────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
}
