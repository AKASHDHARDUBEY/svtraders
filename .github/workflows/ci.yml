name: SV Traders CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd server && npm install
          cd ../client && npm install

      - name: Run Linter
        run: |
          cd client && npm run lint

      - name: Run Tests
        run: |
          cd server && npm test
